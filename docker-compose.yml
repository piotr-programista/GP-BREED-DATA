version: "3.9"

services:
  db:
    image: postgres:16
    container_name: gp_breed_db
    restart: always
    environment:
      POSTGRES_USER: gpbreed
      POSTGRES_PASSWORD: gpbreed_password
      POSTGRES_DB: gpbreed
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: